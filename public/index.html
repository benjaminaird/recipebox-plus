  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'DM Sans', sans-serif; background: #FAF7F2; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card { transition: transform 0.18s, box-shadow 0.18s; cursor: pointer; }

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const C = {
      cream:"#FAF7F2", cream2:"#F3EDE3", cream3:"#E8DDD0", border:"#DDD3C4",
      dark:"#1C1410", mid:"#4A3728", light:"#9E8272", brown:"#5C3D2E", brownLight:"#C4A882",
      green:"#2D5016", greenMid:"#4A7C2F", greenPale:"#EFF5E8",
      terra:"#C4622D", terraPale:"#FDF0E8",
      gold:"#C8922A", goldLight:"#E8C060", goldPale:"#FDF8EC",
      blue:"#2563EB", bluePale:"#EFF6FF",
      red:"#C0392B", redPale:"#FDECEA", white:"#FFFFFF",
    };
    const SERIF = "'DM Serif Display', serif";
    const SANS = "'DM Sans', sans-serif";
    const CARD_COLORS = ["#4A7C2F","#C4622D","#C8922A","#5C3D2E","#2D5016","#8B6252","#1A6B6B"];
    const CATEGORIES = ["Appetizers","Entrées","Sides","Condiments & Sauces","Desserts"];
    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

    const uid = () => Math.random().toString(36).slice(2, 9);
    const cardColor = (t) => CARD_COLORS[(t?.charCodeAt(0) || 0) % CARD_COLORS.length];

    function scaleAmount(amount, factor) {
      const n = parseFloat(amount);
      if (isNaN(n)) return amount;
      const r = n * factor;
      return r % 1 === 0 ? String(r) : parseFloat(r.toFixed(2)).toString();
    }

    const METRIC_MAP = {
      cup:{mult:240,unit:"ml"}, tbsp:{mult:15,unit:"ml"}, tsp:{mult:5,unit:"ml"},
      oz:{mult:28,unit:"g"}, lb:{mult:454,unit:"g"},
    };
    function convertMetric(amount, unit) {
      const c = METRIC_MAP[(unit||"").toLowerCase()];
      if (!c) return { amount, unit: unit||"" };
      return { amount: Math.round(parseFloat(amount) * c.mult), unit: c.unit };
    }

    function parseAIJson(raw) {
      const m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("No JSON found in response");
      return JSON.parse(m[0]);
    }

    // Convert HEIC/HEIF to JPEG silently
    async function convertToJpeg(file) {
      if (!file.type.includes("heic") && !file.type.includes("heif") && file.name && !file.name.toLowerCase().includes(".heic") && !file.name.toLowerCase().includes(".heif")) {
        return file;
      }
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          canvas.toBlob((blob) => {
            URL.revokeObjectURL(url);
            resolve(new File([blob], file.name + ".jpg", { type: "image/jpeg" }));
          }, "image/jpeg", 0.92);
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
        img.src = url;
      });
    }

    async function fileToBase64(file) {
      const converted = await convertToJpeg(file);
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const base64 = e.target.result.split(",")[1];
          resolve({ data: base64, type: converted.type || "image/jpeg" });
        };
        reader.onerror = reject;
        reader.readAsDataURL(converted);
      });
    }

      const res = await fetch("/api/ai", {

    function StepText({ text, ingredients, scale, metric }) {
      const parts = [];
      const regex = /\{([^}]+)\}/g;
      let last = 0, match;
      while ((match = regex.exec(text)) !== null) {
        if (match.index > last) parts.push({ type:"text", value:text.slice(last, match.index) });
        const ing = ingredients.find((i) => i.id === match[1]);
        if (ing) {
          let amt = scaleAmount(ing.amount, scale), unit = ing.unit || "";
          if (metric) { const c = convertMetric(amt, unit); amt = c.amount; unit = c.unit; }
          parts.push({ type:"chip", value:`${amt}${unit?" "+unit:""} ${ing.name}` });
        }
        last = regex.lastIndex;
      }
      if (last < text.length) parts.push({ type:"text", value:text.slice(last) });
      return (
        <span>
          {parts.map((p, i) => p.type === "chip"
            ? <span key={i} style={{background:C.goldPale,border:"1px solid "+C.goldLight,borderRadius:5,padding:"1px 8px",margin:"0 2px",fontSize:"0.87em",fontWeight:600,color:C.brown,whiteSpace:"nowrap",display:"inline-block"}}>{p.value}</span>

    // Pantry Chef
    function PantryChef({ onImport }) {
      const [messages, setMessages] = useState([{ role:"assistant", content:"Hey! I'm your Pantry Chef 🍳\n\nTell me what's in your fridge and pantry - or snap a photo - and I'll suggest recipes you can make right now. You can also tell me what cuisine you're in the mood for!" }]);
      const [input, setInput] = useState("");
      const [image, setImage] = useState(null);
      const [loading, setLoading] = useState(false);
      const imgRef = useRef();
      const bottomRef = useRef();

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

      async function send() {
        if (!input.trim() && !image) return;
        const display = image ? "📷 " + (input||"Photo sent") : input;
        const userContent = image ? [{ type:"image", source:{ type:"base64", media_type:image.type, data:image.data } }, { type:"text", text:input||"What can I make from this photo?" }] : input;
        setMessages((p) => [...p, { role:"user", content:display }]);
        setInput(""); setImage(null); setLoading(true);
        try {
          const apiMsgs = messages.map((m) => ({ role:m.role, content:m.content }));
          apiMsgs.push({ role:"user", content:userContent });
          const reply = await callAI(apiMsgs, PANTRY_PROMPT, 1200);
          const jm = reply.match(/<RECIPE_JSON>([\s\S]*?)<\/RECIPE_JSON>/);
          const clean = reply.replace(/<RECIPE_JSON>[\s\S]*?<\/RECIPE_JSON>/g,"").trim();
          setMessages((p) => [...p, { role:"assistant", content:clean }]);
          if (jm) {
            try {
              const r = JSON.parse(jm[1].trim());
              r.id=uid(); r.createdAt=new Date().toISOString(); r.rating=0; r.favorite=false; r.heroImage="";
              if (confirm(`Add "${r.title}" to your RecipeBox+?`)) onImport(r);
            } catch(e) {}
          }
        } catch(e) { setMessages((p) => [...p, { role:"assistant", content:"Sorry, something went wrong. Try again!" }]); }
        setLoading(false);
      }

      return (
        <div style={{height:"100vh",display:"flex",flexDirection:"column",background:C.cream}}>
          <div style={{background:`linear-gradient(135deg, ${C.terra}, ${C.gold})`,padding:"24px 20px 20px"}}>
            <div style={{fontFamily:SERIF,fontSize:"1.8em",color:C.white}}>Pantry Chef</div>
            <div style={{color:"rgba(255,255,255,0.8)",fontSize:"0.8em",marginTop:2}}>AI recipe suggestions from what you have</div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
            <div style={{maxWidth:680,margin:"0 auto",display:"flex",flexDirection:"column",gap:11}}>
              {messages.map((m, i) => (
                <div key={i} className="fade-up" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{maxWidth:"82%",background:m.role==="user"?C.dark:C.white,color:m.role==="user"?C.white:C.dark,borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",fontSize:"0.88em",lineHeight:1.65,boxShadow:"0 2px 10px rgba(92,61,46,0.08)",border:m.role!=="user"?"1px solid "+C.border:"none",whiteSpace:"pre-wrap"}}>{m.content}</div>
                </div>
              ))}
              {loading && <div style={{display:"flex"}}><div style={{background:C.white,border:"1px solid "+C.border,borderRadius:"16px 16px 16px 4px",padding:"10px 16px",color:C.light,fontSize:"0.85em"}}>Thinking...</div></div>}
              <div ref={bottomRef} />
            </div>
          </div>
          {image && <div style={{textAlign:"center",padding:"3px 0",fontSize:"0.76em",color:C.terra}}>📷 Photo ready</div>}
          <div style={{padding:"10px 16px 20px",background:C.white,borderTop:"1px solid "+C.border}}>
            <div style={{maxWidth:680,margin:"0 auto",display:"flex",gap:7,alignItems:"flex-end"}}>
              <input type="file" ref={imgRef} accept="image/*" onChange={async (e) => { const f=e.target.files[0]; if(!f)return; const b=await fileToBase64(f); setImage(b); }} style={{display:"none"}} />
              <button onClick={() => imgRef.current.click()} style={{background:C.cream2,border:"1px solid "+C.border,borderRadius:8,padding:"9px 11px",cursor:"pointer",fontSize:"1.1em",flexShrink:0}}>📷</button>
              <textarea value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }} placeholder="What's in your fridge? What are you craving?" rows={2} style={{flex:1,padding:"9px 12px",border:"1px solid "+C.border,borderRadius:8,fontSize:"0.88em",resize:"none",outline:"none",fontFamily:SANS}} />
              <button onClick={send} disabled={loading||(!input.trim()&&!image)} style={{background:C.terra,color:C.white,border:"none",borderRadius:8,padding:"9px 18px",fontWeight:700,cursor:"pointer",fontFamily:SANS,opacity:loading?0.6:1}}>Send</button>
            </div>
          </div>
        </div>
      );
    }

    // Import Screen
    function ImportScreen({ onDone, onCancel }) {
      const [mode, setMode] = useState("url");
      const [url, setUrl] = useState("");
      const [ytUrl, setYtUrl] = useState("");
      const [text, setText] = useState("");
      const [images, setImages] = useState([]);
      const [pdfTexts, setPdfTexts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState("");
      const [error, setError] = useState("");
      const [showCategoryModal, setShowCategoryModal] = useState(false);
      const [pendingRecipe, setPendingRecipe] = useState(null);
      const fileRef = useRef();

      async function extract() {
        setLoading(true);
        setError("");

        try {
          let parsed;

          if (mode === "url") {
            setLoadingMsg("Fetching recipe...");
            const prompt = "Import the recipe at this URL: " + url + "\n\nReconstruct the complete accurate recipe from your training knowledge. Include heroImage URL if you know the site's image. If you truly don't recognise it, return {\"error\":\"unknown_recipe\"}.";
            const raw = await callAI([{ role:"user", content:prompt }], EXTRACT_PROMPT, 2000);
            parsed = parseAIJson(raw);
            if (parsed.error === "unknown_recipe") throw new Error("Recipe not found. Please use Paste Text instead.");

          } else if (mode === "youtube") {
            setLoadingMsg("Fetching YouTube transcript...");
            const transcriptRes = await fetch("/api/transcript?url=" + encodeURIComponent(ytUrl));
            const transcriptData = await transcriptRes.json();
            if (transcriptData.error) throw new Error("Could not fetch transcript: " + transcriptData.error);

            setLoadingMsg("Extracting recipe from transcript...");
            let content = "Video title: " + transcriptData.title + "\n\n";
            if (transcriptData.transcript) {
              content += "Transcript:\n" + transcriptData.transcript;
            } else if (transcriptData.description) {
              content += "Description:\n" + transcriptData.description;
            } else {
              throw new Error("No transcript or description found. Try Paste Text instead.");
            }
            if (transcriptData.thumbnail) {
              content += "\n\nVideo thumbnail URL: " + transcriptData.thumbnail;
            }

            const raw = await callAI([{ role:"user", content:"Extract the recipe from this YouTube video content:\n\n" + content }], EXTRACT_PROMPT, 2000);
            parsed = parseAIJson(raw);
            if (!parsed.heroImage && transcriptData.thumbnail) {
              parsed.heroImage = transcriptData.thumbnail;
            }

          } else if (mode === "text") {
            setLoadingMsg("Extracting recipe...");
            const raw = await callAI([{ role:"user", content:"Extract the recipe from this text:\n\n" + text }], EXTRACT_PROMPT, 2000);
            parsed = parseAIJson(raw);

          } else if (mode === "media" && pdfTexts.length > 0) {
            setLoadingMsg("Reading recipe from PDF...");
            const pdfContent = pdfTexts.join(" ");
            if (!pdfContent.trim()) throw new Error("Could not read PDF text. Try a photo instead.");
            const rawPdf = await callAI([{ role:"user", content: "Extract the recipe from this PDF: " + pdfContent }], EXTRACT_PROMPT, 2000);
            parsed = parseAIJson(rawPdf);
          } else if (mode === "media" && images.length > 0) {
            setLoadingMsg("Reading recipe from image...");
            const imgArr = images.map((img, i) => ({
              type: "image",
              source: { type: "base64", media_type: img.type, data: img.data }
            }));
            imgArr.push({ type: "text", text: "Extract the recipe from these " + images.length + " image(s) of the same recipe." });
            const raw = await callAI([{ role:"user", content: imgArr }], EXTRACT_PROMPT, 2000);
            parsed = parseAIJson(raw);
          }

          if (!parsed || !parsed.title || !parsed.sections) throw new Error("Could not extract a complete recipe. Try Paste Text.");
          parsed.id = uid();
          parsed.createdAt = new Date().toISOString();
          parsed.rating = 0;
          parsed.favorite = false;
          if (!parsed.heroImage) parsed.heroImage = "";

          setPendingRecipe(parsed);
          setShowCategoryModal(true);

        } catch(e) {
          setError(e.message || "Could not extract recipe.");
        }
        setLoading(false);
        setLoadingMsg("");
      }

      function handleCategorySelect(category) {
        const recipe = { ...pendingRecipe, category };
        setShowCategoryModal(false);
        setPendingRecipe(null);
        onDone(recipe);
      }

      async function extractPdfText(file) {
        return new Promise(function(resolve) {
          const reader = new FileReader();
          reader.onload = async function(e) {
            try {
              const lib = window["pdfjs-dist/build/pdf"];
              lib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
              const pdf = await lib.getDocument({ data: e.target.result }).promise;
              let text = "";
              for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const c = await page.getTextContent();
                text += c.items.map(function(x) { return x.str; }).join(" ") + " ";
              }
              resolve(text.trim());
            } catch(err) { resolve(""); }
          };
          reader.readAsArrayBuffer(file);
        });
      }
      async function handleFiles(e) {
        const files = Array.from(e.target.files).slice(0, 4);
        const pdfs = files.filter(function(f) { return f.type === "application/pdf" || f.name.toLowerCase().endsWith(".pdf"); });
        const imgs = files.filter(function(f) { return f.type !== "application/pdf" && !f.name.toLowerCase().endsWith(".pdf"); });
        if (pdfs.length > 0) {
          setPdfTexts(await Promise.all(pdfs.map(extractPdfText)));
          setImages([]);
        } else {
          setImages(await Promise.all(imgs.map(fileToBase64)));
          setPdfTexts([]);
        }
      }

      const tabs = [
        { id:"url", label:"🔗 URL" },
        { id:"youtube", label:"▶️ YouTube" },
        { id:"text", label:"📄 Paste Text" },
        { id:"media", label:"📷 Photo / PDF" },
      ];

      const canSubmit = !loading && (
        (mode==="url" && url) ||
        (mode==="youtube" && ytUrl) ||
        (mode==="text" && text.trim()) ||
        (mode==="media" && (images.length > 0 || pdfTexts.length > 0))
      );

      return (
        <div style={{minHeight:"100vh",background:C.cream}}>
          {showCategoryModal && (
            <CategoryModal
              onSelect={handleCategorySelect}
              onCancel={() => { setShowCategoryModal(false); setPendingRecipe(null); }}
            />
          )}
          <div style={{background:"linear-gradient(135deg, #1C1410, #5C3D2E)",padding:"20px",display:"flex",alignItems:"center",gap:12}}>
            <button onClick={onCancel} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,padding:"7px 14px",color:"rgba(255,255,255,0.8)",cursor:"pointer",fontFamily:SANS,fontSize:"0.85em"}}>← Back</button>
            <div style={{fontFamily:SERIF,fontSize:"1.35em",color:C.white}}>Add New Recipe</div>
          </div>

          <div style={{maxWidth:560,margin:"0 auto",padding:"28px 20px"}}>
            <div style={{display:"flex",background:C.cream2,borderRadius:12,padding:4,marginBottom:22}}>
              {tabs.map((t) => (
                <button key={t.id} onClick={() => setMode(t.id)}
                  style={{flex:1,padding:"9px 4px",border:"none",borderRadius:9,background:mode===t.id?C.white:"transparent",color:mode===t.id?C.dark:C.light,fontWeight:mode===t.id?600:400,cursor:"pointer",fontSize:"0.75em",fontFamily:SANS,boxShadow:mode===t.id?"0 1px 6px rgba(92,61,46,0.1)":"none"}}>
                  {t.label}
                </button>
              ))}
            </div>

            {mode === "url" && (
              <input value={url} onChange={(e) => setUrl(e.target.value)} onKeyDown={(e) => e.key==="Enter"&&extract()} placeholder="https://recipe-site.com/recipe-name"
                style={{width:"100%",padding:"12px 15px",border:"1.5px solid "+C.border,borderRadius:8,fontSize:"0.92em",outline:"none",marginBottom:18,boxSizing:"border-box",fontFamily:SANS}} />
            )}

            {mode === "youtube" && (
              <div>
                <input value={ytUrl} onChange={(e) => setYtUrl(e.target.value)} onKeyDown={(e) => e.key==="Enter"&&extract()} placeholder="https://youtube.com/watch?v=..."
                  style={{width:"100%",padding:"12px 15px",border:"1.5px solid "+C.border,borderRadius:8,fontSize:"0.92em",outline:"none",marginBottom:10,boxSizing:"border-box",fontFamily:SANS}} />
                <div style={{background:C.goldPale,border:"1px solid "+C.goldLight,borderRadius:8,padding:"9px 13px",fontSize:"0.78em",color:C.brown,marginBottom:18,lineHeight:1.5}}>
                  ▶️ RecipeBox+ will fetch the video transcript and extract the recipe automatically. Works best when the recipe is spoken in the video.
                </div>
              </div>
            )}

            {mode === "text" && (
              <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder="Paste recipe text here..." rows={11}
                style={{width:"100%",padding:"12px 15px",border:"1.5px solid "+C.border,borderRadius:8,fontSize:"0.9em",resize:"vertical",outline:"none",marginBottom:18,boxSizing:"border-box",fontFamily:SANS}} />
            )}

            {mode === "media" && (
              <div>
                <input ref={fileRef} type="file" accept="image/*,.pdf,image/heic,image/heif" multiple onChange={handleFiles} style={{display:"none"}} />
                <div onClick={() => fileRef.current.click()}
                  style={{border:"2px dashed "+(images.length>0?C.green:C.border),borderRadius:12,padding:36,textAlign:"center",cursor:"pointer",color:images.length>0?C.green:C.light,marginBottom:10,background:images.length>0?C.greenPale:"transparent"}}>
                  <div style={{fontSize:"2.2em",marginBottom:6}}>{images.length>0?"✓":"📷"}</div>
                  <div style={{fontWeight:600,fontSize:"0.88em"}}>
                    {images.length>0 ? images.length+" file"+(images.length>1?"s":"")+" ready - tap to change" : "Upload photo, screenshot, or PDF"}
                  </div>
                  <div style={{fontSize:"0.75em",marginTop:4,color:C.light}}>Up to 4 images of the same recipe · HEIC, JPG, PNG, PDF</div>
                </div>
                {images.length > 0 && (
                  <div style={{background:C.goldPale,border:"1px solid "+C.goldLight,borderRadius:8,padding:"8px 12px",fontSize:"0.78em",color:C.brown,marginBottom:10}}>
                    ⚠️ Please make sure all images are pages of the same recipe - multiple different recipes can't be imported at once.
                  </div>
                )}
              </div>
            )}

            <button onClick={extract} disabled={!canSubmit}
              style={{width:"100%",background:"linear-gradient(135deg, #1C1410, #5C3D2E)",color:C.white,border:"none",borderRadius:12,padding:15,fontWeight:700,cursor:canSubmit?"pointer":"not-allowed",fontSize:"0.95em",fontFamily:SERIF,letterSpacing:0.5,opacity:canSubmit?1:0.6,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              {loading ? <><Spinner /> {loadingMsg || "Extracting..."}</> : "✦ Extract & Import Recipe"}
            </button>

            {error && (
              <div style={{marginTop:13,background:C.redPale,border:"1px solid "+C.red+"50",borderRadius:8,padding:"11px 15px",fontSize:"0.83em",color:C.red,lineHeight:1.6}}>{error}</div>
            )}
          </div>
        </div>
      );
    }

    // Recipe View
    function RecipeView({ recipe, onBack, onEdit, onDelete, onUpdate, onImport }) {
      const [scale, setScale] = useState(1);
      const [metric, setMetric] = useState(false);
      const [cookMode, setCookMode] = useState(false);
      const [cookStep, setCookStep] = useState(0);
      const [timers, setTimers] = useState({});
      const [showAI, setShowAI] = useState(false);
      const [showShop, setShowShop] = useState(false);
      const [showWTB, setShowWTB] = useState(false);
      const [aiQuery, setAiQuery] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const [aiResult, setAiResult] = useState(null);
      const [wtbMode, setWtbMode] = useState("text");
      const [wtbText, setWtbText] = useState("");
      const [wtbImage, setWtbImage] = useState(null);
      const [wtbResult, setWtbResult] = useState(null);
      const [wtbLoading, setWtbLoading] = useState(false);
      const wtbImgRef = useRef();
      const heroImgRef = useRef();

      const allSteps = recipe.sections.flatMap((s) => s.steps.map((st) => ({ ...st, secName:s.name, ingredients:s.ingredients })));
      const allIngredients = recipe.sections.flatMap((s) => s.ingredients);

      useEffect(() => {
        const iv = setInterval(() => {
          setTimers((p) => {
            const n = { ...p }; let changed = false;
            Object.keys(n).forEach((k) => { if (n[k].running && n[k].rem > 0) { n[k] = { ...n[k], rem:n[k].rem-1 }; changed=true; } });
            return changed ? n : p;
          });
        }, 1000);
        return () => clearInterval(iv);
      }, []);

      function timerSec(text) { const m=text.match(/(\d+)\s*(?:to\s*\d+\s*)?min/i); return m?parseInt(m[1])*60:null; }
      function fmt(s) { return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

      async function runAIAdjust() {
        if (!aiQuery.trim()) return;
        setAiLoading(true);
        try { setAiResult(parseAIJson(await callAI([{ role:"user", content:"Recipe: "+JSON.stringify(recipe)+"\nRequest: "+aiQuery }], ADJUST_PROMPT, 2000))); }
        catch(e) { alert("AI adjustment failed."); }
        setAiLoading(false);
      }

      async function runWTB() {
        setWtbLoading(true);
        const il = allIngredients.map((i) => i.amount+(i.unit?" "+i.unit:"")+" "+i.name).join(", ");
        try {
          let msgs;
          if (wtbMode==="photo"&&wtbImage) {
            msgs=[{role:"user",content:[{type:"image",source:{type:"base64",media_type:wtbImage.type,data:wtbImage.data}},{type:"text",text:"For recipe: "+recipe.title+"\nNeeded: "+il+"\nWhich do I have? Return JSON: {\"have\":[],\"need\":[],\"notes\":\"\"}"}]}];
          } else {
            msgs=[{role:"user",content:"For recipe: "+recipe.title+"\nNeeded: "+il+"\nI have: "+wtbText+"\nReturn JSON: {\"have\":[],\"need\":[],\"notes\":\"\"}"}];
          }
          setWtbResult(parseAIJson(await callAI(msgs, null, 800)));
        } catch(e) { alert("Analysis failed."); }
        setWtbLoading(false);
      }

      function exportPDF() {
        if (!window.jspdf) { alert("PDF library loading. Try again."); return; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF(); let y=20;
        doc.setFontSize(20); doc.setFont("helvetica","bold"); doc.text(recipe.title,14,y); y+=10;
        doc.setFontSize(10); doc.setFont("helvetica","normal"); doc.text((recipe.cookTime||"")+" · Serves "+Math.round((recipe.servings||4)*scale),14,y); y+=12;
        recipe.sections.forEach((sec) => {
          doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.text("Ingredients",14,y); y+=7;
          sec.ingredients.forEach((ing) => { doc.setFontSize(10); doc.setFont("helvetica","normal"); doc.text("• "+scaleAmount(ing.amount,scale)+(ing.unit?" "+ing.unit:"")+" "+ing.name,18,y); y+=5; if(y>270){doc.addPage();y=20;} });
          y+=4; doc.setFontSize(13); doc.setFont("helvetica","bold"); doc.text("Directions",14,y); y+=7;
          sec.steps.forEach((step,idx) => {
            doc.setFontSize(10); doc.setFont("helvetica","normal");
            const t=step.text.replace(/\{([^}]+)\}/g,(m,id)=>{ const ing=sec.ingredients.find((x)=>x.id===id); return ing?scaleAmount(ing.amount,scale)+(ing.unit?" "+ing.unit:"")+" "+ing.name:m; });
            doc.splitTextToSize((idx+1)+". "+t,180).forEach((l)=>{ doc.text(l,14,y); y+=5; if(y>270){doc.addPage();y=20;} }); y+=2;
          }); y+=8;
        });
        doc.save(recipe.title.replace(/\s+/g,"-")+".pdf");
      }

      const color = cardColor(recipe.title);
      const hasHeroImage = recipe.heroImage && recipe.heroImage.length > 0;

      if (cookMode && allSteps.length > 0) {
        const cur=allSteps[cookStep], tS=timerSec(cur.text), tK="cook-"+cookStep, timer=timers[tK];
        return (
          <div style={{minHeight:"100vh",background:"#111",color:C.white,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:SANS,padding:24}}>
            <div style={{maxWidth:560,width:"100%",textAlign:"center"}}>
              <div style={{color:C.brownLight,fontSize:"0.72em",letterSpacing:3,textTransform:"uppercase",fontFamily:SERIF,marginBottom:6}}>{cur.secName}</div>
              <div style={{color:"#555",fontSize:"0.8em",marginBottom:18}}>Step {cookStep+1} of {allSteps.length}</div>
              <div style={{fontSize:"1.25em",lineHeight:1.8,marginBottom:26,background:"#1A1A1A",borderRadius:14,padding:"26px 30px",border:"1px solid #2A2A2A"}}>
                <StepText text={cur.text} ingredients={cur.ingredients} scale={scale} metric={metric} />
              </div>
              {tS && (timer ? (
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:"2.8em",fontWeight:700,color:timer.rem===0?C.red:C.goldLight,fontFamily:SERIF}}>{fmt(timer.rem)}</div>
                  {timer.rem > 0
                    ? <button onClick={() => setTimers((p) => ({...p,[tK]:{...p[tK],running:!p[tK].running}}))} style={{background:"transparent",border:"1px solid "+C.goldLight,color:C.goldLight,borderRadius:8,padding:"6px 16px",cursor:"pointer",fontFamily:SANS,marginTop:5}}>{timer.running?"Pause":"Resume"}</button>
                    : <div style={{color:C.red,fontWeight:700}}>⏰ Time's up!</div>
                  }
                </div>
              ) : (
                <button onClick={() => setTimers((p) => ({...p,[tK]:{rem:tS,total:tS,running:true}}))} style={{background:C.gold,color:C.dark,border:"none",borderRadius:8,padding:"9px 22px",fontWeight:700,cursor:"pointer",marginBottom:18,fontFamily:SANS}}>
                  ⏱ Start {Math.floor(tS/60)} min timer
                </button>
              ))}
              <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                {cookStep>0 && <button onClick={() => setCookStep((p)=>p-1)} style={{background:"#2A2A2A",color:"#CCC",border:"none",borderRadius:8,padding:"12px 24px",cursor:"pointer",fontFamily:SANS}}>← Back</button>}
                {cookStep<allSteps.length-1
                  ? <button onClick={() => setCookStep((p)=>p+1)} style={{background:C.gold,color:C.dark,border:"none",borderRadius:8,padding:"12px 28px",fontWeight:700,cursor:"pointer",fontFamily:SANS}}>Next →</button>
                  : <button onClick={() => setCookMode(false)} style={{background:C.green,color:C.white,border:"none",borderRadius:8,padding:"12px 28px",fontWeight:700,cursor:"pointer",fontFamily:SANS}}>✓ Done!</button>
                }
              </div>
              <button onClick={() => setCookMode(false)} style={{marginTop:18,background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:"0.82em",fontFamily:SANS}}>Exit</button>
            </div>
          </div>
        );
      }

      return (
        <div style={{minHeight:"100vh",background:C.cream,paddingBottom:90}}>
          {/* Hero */}
          <div style={{minHeight:200,position:"relative",display:"flex",alignItems:"flex-end",overflow:"hidden",background:hasHeroImage?"#000":`linear-gradient(135deg, ${color}, ${color}AA)`}}>
            {hasHeroImage && (
              <img src={recipe.heroImage} alt={recipe.title}
                style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:0.75}}
                onError={(e) => { e.target.style.display="none"; }} />
            )}
            <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.65))"}} />
            <div style={{position:"absolute",top:14,left:14}}>
              <button onClick={onBack} style={{background:"rgba(0,0,0,0.38)",border:"none",borderRadius:8,padding:"7px 13px",color:C.white,cursor:"pointer",fontSize:"0.8em",fontFamily:SANS}}>← Library</button>
            </div>
            <div style={{position:"absolute",top:14,right:14,display:"flex",gap:7}}>
              <button onClick={() => onUpdate({...recipe,favorite:!recipe.favorite})} style={{background:"rgba(0,0,0,0.38)",border:"none",borderRadius:8,padding:"7px 11px",color:recipe.favorite?"#FFD700":C.white,cursor:"pointer",fontSize:"1em"}}>{recipe.favorite?"★":"☆"}</button>
              <button onClick={onEdit} style={{background:"rgba(0,0,0,0.38)",border:"none",borderRadius:8,padding:"7px 11px",color:C.white,cursor:"pointer",fontSize:"0.8em",fontFamily:SANS}}>Edit</button>
              <button onClick={onDelete} style={{background:"rgba(180,0,0,0.45)",border:"none",borderRadius:8,padding:"7px 11px",color:C.white,cursor:"pointer",fontSize:"0.8em",fontFamily:SANS}}>Delete</button>
            </div>
            <div style={{position:"relative",padding:"0 20px 18px",width:"100%"}}>
              <div style={{fontSize:"0.7em",color:"rgba(255,255,255,0.65)",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{recipe.category}</div>
              <h1 style={{margin:0,fontFamily:SERIF,fontSize:"clamp(1.5em,5vw,2.3em)",color:C.white,fontWeight:400,lineHeight:1.1}}>{recipe.title}</h1>
              <div style={{display:"flex",gap:14,marginTop:7,flexWrap:"wrap",alignItems:"center"}}>
                {recipe.cookTime && <span style={{color:"rgba(255,255,255,0.82)",fontSize:"0.8em"}}>⏱ {recipe.cookTime}</span>}
                <span style={{color:"rgba(255,255,255,0.82)",fontSize:"0.8em"}}>🍽 {Math.round((recipe.servings||4)*scale)} servings</span>
                {recipe.rating>0 && <Stars value={recipe.rating} size={13} />}
              </div>
            </div>
          </div>

          <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px"}}>
            {/* Action bar */}
            <div style={{display:"flex",gap:7,padding:"13px 0",overflowX:"auto",borderBottom:"1px solid "+C.border}}>
              {[
                {label:"✦ AI Adjust",action:()=>setShowAI(!showAI),bg:C.cream2,color:C.brown,border:"1px solid "+C.border},
                {label:"👨‍🍳 Cook",action:()=>setCookMode(true),bg:C.green,color:C.white,border:"none"},
                {label:"🛒 Shop List",action:()=>setShowShop(!showShop),bg:C.bluePale,color:C.blue,border:"1px solid "+C.blue+"25"},
                {label:"🔍 What to Buy",action:()=>setShowWTB(!showWTB),bg:C.terraPale,color:C.terra,border:"1px solid "+C.terra+"25"},
                {label:"↓ PDF",action:exportPDF,bg:C.greenPale,color:C.green,border:"1px solid "+C.green+"25"},
              ].map((btn) => (
                <button key={btn.label} onClick={btn.action} style={{background:btn.bg,color:btn.color,border:btn.border,borderRadius:8,padding:"6px 14px",fontWeight:600,cursor:"pointer",fontSize:"0.8em",fontFamily:SANS,whiteSpace:"nowrap",flexShrink:0}}>{btn.label}</button>
              ))}
            </div>

            {/* Rating */}
            <div style={{padding:"10px 0",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:"0.8em",color:C.light}}>Your rating:</span>
              <Stars value={recipe.rating||0} onChange={(v)=>onUpdate({...recipe,rating:v})} size={20} />
            </div>

            {recipe.description && <p style={{color:C.mid,lineHeight:1.7,margin:"0 0 14px",fontSize:"0.92em"}}>{recipe.description}</p>}
            {recipe.tags?.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>{recipe.tags.map((t)=><Tag key={t} label={t} />)}</div>}

            {/* Macros */}
            {recipe.macros && (
              <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:18,padding:"12px 14px",background:C.white,borderRadius:8,border:"1px solid "+C.border}}>
                {[["Calories",recipe.macros.calories,"",C.terra],["Protein",recipe.macros.protein,"g",C.blue],["Carbs",recipe.macros.carbs,"g",C.gold],["Fat",recipe.macros.fat,"g",C.greenMid||"#4A7C2F"],["Fiber",recipe.macros.fiber,"g",C.brown]].map(([label,val,unit,clr])=>(
                  <div key={label} style={{textAlign:"center",minWidth:56}}>
                    <div style={{fontSize:"1.05em",fontWeight:700,color:clr,fontFamily:SERIF}}>{Math.round((val||0)*scale)}{unit}</div>
                    <div style={{fontSize:"0.65em",color:C.light,letterSpacing:1,textTransform:"uppercase"}}>{label}</div>
                  </div>
                ))}
                <div style={{fontSize:"0.68em",color:C.light,alignSelf:"flex-end",marginLeft:"auto"}}>per serving</div>
              </div>
            )}

            {/* Scale */}
            <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",marginBottom:18,background:C.white,border:"1px solid "+C.border,borderRadius:8,padding:"9px 13px"}}>
              <span style={{color:C.light,fontSize:"0.8em",marginRight:3}}>Scale:</span>
              {[0.5,1,1.5,2,3].map((f)=>(
                <button key={f} onClick={()=>setScale(f)} style={{background:scale===f?C.dark:C.cream2,color:scale===f?C.white:C.mid,border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:scale===f?700:400,fontSize:"0.78em",fontFamily:SANS}}>
                  {f===0.5?"½×":f+"×"}
                </button>
              ))}
              <div style={{width:1,background:C.border,height:18,margin:"0 3px"}} />
              {["US","Metric"].map((u)=>(
                <button key={u} onClick={()=>setMetric(u==="Metric")} style={{background:(metric?"Metric":"US")===u?C.dark:C.cream2,color:(metric?"Metric":"US")===u?C.white:C.mid,border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:"0.78em",fontFamily:SANS}}>{u}</button>
              ))}
            </div>

            {/* AI adjust */}
            {showAI && (
              <div style={{background:C.goldPale,border:"1px solid "+C.goldLight,borderRadius:12,padding:16,marginBottom:18}}>
                <div style={{fontFamily:SERIF,fontSize:"1.05em",marginBottom:4}}>✦ AI Recipe Adjustment</div>
                <div style={{color:C.brownLight,fontSize:"0.78em",marginBottom:10}}>Try: "make gluten-free", "dairy-free", "lower calorie", "swap butter for olive oil"</div>
                <div style={{display:"flex",gap:7}}>
                  <input value={aiQuery} onChange={(e)=>setAiQuery(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&runAIAdjust()} placeholder="What would you like to change?" style={{flex:1,padding:"8px 12px",border:"1px solid "+C.border,borderRadius:8,fontSize:"0.88em",outline:"none",fontFamily:SANS}} />
                  <button onClick={runAIAdjust} disabled={aiLoading} style={{background:C.gold,color:C.white,border:"none",borderRadius:8,padding:"8px 18px",fontWeight:700,cursor:"pointer",fontFamily:SANS,display:"flex",alignItems:"center",gap:6}}>{aiLoading?<Spinner/>:"Apply"}</button>
                </div>
                {aiResult && (
                  <div style={{marginTop:11,background:C.white,borderRadius:8,padding:11,border:"1px solid "+C.border}}>
                    <div style={{fontWeight:600,marginBottom:7,color:C.dark,fontSize:"0.9em"}}>Preview: {aiResult.title}</div>
                    <div style={{display:"flex",gap:7}}>
                      <button onClick={()=>{ const r={...aiResult,id:uid(),createdAt:new Date().toISOString(),title:aiResult.title+" (adjusted)",rating:0,favorite:false}; onImport(r); setShowAI(false); setAiResult(null); }} style={{background:C.green,color:C.white,border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,cursor:"pointer",fontSize:"0.82em",fontFamily:SANS}}>Save as new version</button>
                      <button onClick={()=>setAiResult(null)} style={{background:"none",border:"1px solid "+C.border,color:C.mid,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:"0.82em",fontFamily:SANS}}>Discard</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Shopping list */}
            {showShop && (
              <div style={{background:C.bluePale,border:"1px solid "+C.blue+"30",borderRadius:12,padding:16,marginBottom:18}}>
                <div style={{fontFamily:SERIF,fontSize:"1.05em",marginBottom:11}}>🛒 Shopping List</div>
                {allIngredients.map((ing,i)=>{ let a=scaleAmount(ing.amount,scale),u=ing.unit||""; if(metric){const c=convertMetric(a,u);a=c.amount;u=c.unit;} return <div key={i} style={{padding:"5px 0",borderBottom:"1px solid "+C.blue+"18",fontSize:"0.88em",color:C.dark}}>☐ {a}{u?" "+u:""} {ing.name}</div>; })}
              </div>
            )}

            {/* What to buy */}
            {showWTB && (
              <div style={{background:C.terraPale,border:"1px solid "+C.terra+"30",borderRadius:12,padding:16,marginBottom:18}}>
                <div style={{fontFamily:SERIF,fontSize:"1.05em",marginBottom:11}}>🔍 What Do I Need to Buy?</div>
                <div style={{display:"flex",gap:7,marginBottom:12}}>
                  {["text","photo"].map((m)=>(
                    <button key={m} onClick={()=>{setWtbMode(m);setWtbResult(null);}} style={{flex:1,padding:7,border:"2px solid "+(wtbMode===m?C.terra:C.border),borderRadius:8,background:wtbMode===m?C.terra:C.white,color:wtbMode===m?C.white:C.mid,fontWeight:600,cursor:"pointer",fontSize:"0.8em",fontFamily:SANS}}>{m==="photo"?"📷 Photo":"✏️ Describe"}</button>
                  ))}
                </div>
                {!wtbResult ? (
                  <div>
                    {wtbMode==="text"
                      ? <textarea value={wtbText} onChange={(e)=>setWtbText(e.target.value)} placeholder="List ingredients you have..." rows={3} style={{width:"100%",padding:"8px 11px",border:"1px solid "+C.border,borderRadius:8,fontSize:"0.86em",resize:"vertical",outline:"none",marginBottom:9,boxSizing:"border-box",fontFamily:SANS}} />
                      : <div>
                          <input ref={wtbImgRef} type="file" accept="image/*" onChange={async (e)=>{ const f=e.target.files[0]; if(!f)return; const b=await fileToBase64(f); setWtbImage(b); }} style={{display:"none"}} />
                          <div onClick={()=>wtbImgRef.current.click()} style={{border:"2px dashed "+C.border,borderRadius:8,padding:22,textAlign:"center",cursor:"pointer",color:wtbImage?C.green:C.light,marginBottom:9,background:wtbImage?C.greenPale:"transparent"}}>{wtbImage?"✓ Photo ready":"Upload fridge/pantry photo"}</div>
                        </div>
                    }
                    <button onClick={runWTB} disabled={wtbLoading||(wtbMode==="text"&&!wtbText.trim())||(wtbMode==="photo"&&!wtbImage)} style={{width:"100%",background:C.terra,color:C.white,border:"none",borderRadius:8,padding:"10px",fontWeight:700,cursor:"pointer",fontFamily:SANS,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{wtbLoading?<><Spinner/> Analyzing...</>:"✦ Analyze My Kitchen"}</button>
                  </div>
                ) : (
                  <div>
                    {wtbResult.have?.length>0 && <div style={{marginBottom:11}}><div style={{fontWeight:700,color:C.green,fontSize:"0.78em",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>✓ You Have</div>{wtbResult.have.map((x,i)=><div key={i} style={{padding:"4px 0",borderBottom:"1px solid "+C.greenPale,fontSize:"0.86em"}}>✓ {x}</div>)}</div>}
                    {wtbResult.need?.length>0 && <div style={{marginBottom:11}}><div style={{fontWeight:700,color:C.red,fontSize:"0.78em",letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>🛒 Need to Buy</div>{wtbResult.need.map((x,i)=><div key={i} style={{padding:"4px 0",borderBottom:"1px solid "+C.redPale,fontSize:"0.86em"}}>☐ {x}</div>)}</div>}
                    {wtbResult.notes && <div style={{background:C.goldPale,borderRadius:8,padding:"7px 11px",fontSize:"0.8em",color:C.brown,marginBottom:7}}>{wtbResult.notes}</div>}
                    <button onClick={()=>setWtbResult(null)} style={{background:"none",border:"1px solid "+C.border,color:C.mid,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:"0.82em",fontFamily:SANS}}>Try again</button>
                  </div>
                )}
              </div>
            )}

            {/* Recipe sections */}
            {recipe.sections.map((sec,si)=>(
              <div key={si} style={{marginBottom:44}}>
                {recipe.sections.length>1 && <h2 style={{fontFamily:SERIF,fontSize:"1.2em",fontWeight:400,color:C.dark,borderBottom:"2px solid "+C.dark,paddingBottom:7,marginBottom:22}}>{sec.name}</h2>}
                <div style={{display:"grid",gridTemplateColumns:"minmax(190px, 300px) 1fr",gap:44}}>
                  <div>
                    <div style={{fontSize:"0.66em",letterSpacing:3,textTransform:"uppercase",fontWeight:700,color:C.brownLight,marginBottom:13}}>Ingredients</div>
                    {sec.ingredients.map((ing,i)=>{ let a=scaleAmount(ing.amount,scale),u=ing.unit||""; if(metric){const c=convertMetric(a,u);a=c.amount;u=c.unit;} return <div key={i} style={{padding:"8px 0",borderBottom:"1px solid "+C.cream3,display:"flex",gap:9,alignItems:"baseline"}}><span style={{fontWeight:700,minWidth:66,color:C.dark,fontSize:"0.88em"}}>{a}{u?" "+u:""}</span><span style={{color:C.mid,fontSize:"0.88em"}}>{ing.name}</span></div>; })}
                  </div>
                  <div>
                    <div style={{fontSize:"0.66em",letterSpacing:3,textTransform:"uppercase",fontWeight:700,color:C.brownLight,marginBottom:13}}>Directions</div>
                    {sec.steps.map((step,i)=>{ const tS=timerSec(step.text),tK=si+"-"+i,timer=timers[tK]; return (
                      <div key={i} style={{display:"flex",gap:13,marginBottom:22}}>
                        <div style={{minWidth:28,height:28,borderRadius:"50%",background:C.dark,color:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:"0.8em",flexShrink:0,marginTop:2}}>{i+1}</div>
                        <div style={{flex:1}}>
                          <p style={{margin:0,lineHeight:1.78,color:C.mid,fontSize:"0.9em"}}><StepText text={step.text} ingredients={sec.ingredients} scale={scale} metric={metric} /></p>
                          {tS && (timer
                            ? <span style={{fontSize:"0.78em",fontWeight:700,color:timer.rem===0?C.red:C.brown,marginTop:6,display:"block"}}>{timer.rem===0?"⏰ Done!":"⏱ "+fmt(timer.rem)+" "}<button onClick={()=>setTimers((p)=>({...p,[tK]:{...p[tK],running:!p[tK].running}}))} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.73em",color:C.brownLight,fontFamily:SANS}}>{timer.running?"pause":"resume"}</button></span>
                            : <button onClick={()=>setTimers((p)=>({...p,[tK]:{rem:tS,total:tS,running:true}}))} style={{marginTop:6,background:C.goldPale,border:"1px solid "+C.goldLight,borderRadius:5,padding:"2px 10px",fontSize:"0.73em",cursor:"pointer",color:C.brown,fontFamily:SANS}}>⏱ {Math.floor(tS/60)} min timer</button>
                          )}
                        </div>
                      </div>
                    ); })}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Edit Recipe with AI Chat Helper
    function EditRecipe({ recipe, onSave, onCancel }) {
      const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(recipe)));
      const [aiChat, setAiChat] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const [aiHistory, setAiHistory] = useState([]);
      const heroImgRef = useRef();

      const set = (k,v) => setDraft((p) => ({...p,[k]:v}));
      const setMacro = (k,v) => setDraft((p) => ({...p,macros:{...(p.macros||{}),[k]:parseFloat(v)||0}}));
      const updIng = (si,ii,k,v) => setDraft((p) => { const s=JSON.parse(JSON.stringify(p.sections)); s[si].ingredients[ii][k]=v; return {...p,sections:s}; });
      const updStep = (si,sti,v) => setDraft((p) => { const s=JSON.parse(JSON.stringify(p.sections)); s[si].steps[sti].text=v; return {...p,sections:s}; });
      const addIng = (si) => setDraft((p) => { const s=JSON.parse(JSON.stringify(p.sections)); s[si].ingredients.push({id:"i"+uid(),amount:"",unit:"",name:""}); return {...p,sections:s}; });
      const remIng = (si,ii) => setDraft((p) => { const s=JSON.parse(JSON.stringify(p.sections)); s[si].ingredients.splice(ii,1); return {...p,sections:s}; });
      const addStep = (si) => setDraft((p) => { const s=JSON.parse(JSON.stringify(p.sections)); s[si].steps.push({id:"s"+uid(),text:"",ingredientRefs:[]}); return {...p,sections:s}; });
      const remStep = (si,sti) => setDraft((p) => { const s=JSON.parse(JSON.stringify(p.sections)); s[si].steps.splice(sti,1); return {...p,sections:s}; });

      async function runEditorAI() {
        if (!aiChat.trim()) return;
        const userMsg = aiChat;
        setAiChat("");
        setAiLoading(true);
        const newHistory = [...aiHistory, { role:"user", content:userMsg }];
        setAiHistory(newHistory);
        try {
          const systemPrompt = EDITOR_AI_PROMPT + "\n\nCurrent recipe JSON:\n" + JSON.stringify(draft);
          const raw = await callAI(newHistory, systemPrompt, 2000);
          const updated = parseAIJson(raw);
          setDraft(updated);
          setAiHistory([...newHistory, { role:"assistant", content:"✓ Done! I've updated the recipe. You can make more changes or save when ready." }]);
        } catch(e) {
          setAiHistory([...newHistory, { role:"assistant", content:"Sorry, I couldn't apply that change. Try describing it differently." }]);
        }
        setAiLoading(false);
      }

      async function handleHeroImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        const b = await fileToBase64(file);
        const dataUrl = "data:" + b.type + ";base64," + b.data;
        set("heroImage", dataUrl);
      }

      const iStyle = {padding:"8px 11px",border:"1px solid "+C.border,borderRadius:8,fontSize:"0.88em",outline:"none",fontFamily:SANS,width:"100%"};

      return (
        <div style={{minHeight:"100vh",background:C.cream}}>
          <div style={{background:"linear-gradient(135deg, #1C1410, #5C3D2E)",padding:"15px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
            <button onClick={onCancel} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,padding:"7px 13px",color:C.white,cursor:"pointer",fontFamily:SANS,fontSize:"0.83em"}}>Cancel</button>
            <div style={{flex:1,color:"rgba(255,255,255,0.65)",fontSize:"0.86em",fontFamily:SERIF,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{draft.title}</div>
            <button onClick={() => onSave(draft)} style={{background:C.gold,color:C.white,border:"none",borderRadius:8,padding:"8px 20px",fontWeight:700,cursor:"pointer",fontFamily:SANS}}>Save</button>
          </div>

          <div style={{maxWidth:760,margin:"0 auto",padding:"24px 20px"}}>

            {/* AI Chat Helper */}
            <div style={{background:"linear-gradient(135deg, "+C.goldPale+", "+C.terraPale+")",border:"1px solid "+C.goldLight,borderRadius:14,padding:16,marginBottom:20}}>
              <div style={{fontFamily:SERIF,fontSize:"1.1em",color:C.dark,marginBottom:4}}>✦ AI Recipe Helper</div>
              <div style={{color:C.brownLight,fontSize:"0.78em",marginBottom:10}}>Describe any change and AI will update the recipe instantly. Try: "add a gluten-free note", "swap cream for coconut milk", "add prep time", "make the steps more detailed"</div>
              {aiHistory.length > 0 && (
                <div style={{marginBottom:10,maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
                  {aiHistory.map((m,i) => (
                    <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                      <div style={{maxWidth:"85%",background:m.role==="user"?C.dark:C.white,color:m.role==="user"?C.white:C.dark,borderRadius:10,padding:"7px 11px",fontSize:"0.82em",lineHeight:1.5}}>{m.content}</div>
                    </div>
                  ))}
                  {aiLoading && <div style={{display:"flex"}}><div style={{background:C.white,borderRadius:10,padding:"7px 11px",fontSize:"0.82em",color:C.light}}>Updating recipe...</div></div>}
                </div>
              )}
              <div style={{display:"flex",gap:7}}>
                <input value={aiChat} onChange={(e)=>setAiChat(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&runEditorAI()} placeholder="Describe a change..." style={{flex:1,padding:"8px 12px",border:"1px solid "+C.border,borderRadius:8,fontSize:"0.88em",outline:"none",fontFamily:SANS,background:C.white}} />
                <button onClick={runEditorAI} disabled={aiLoading||!aiChat.trim()} style={{background:C.terra,color:C.white,border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontFamily:SANS,display:"flex",alignItems:"center",gap:5,opacity:aiLoading?0.6:1}}>{aiLoading?<Spinner/>:"Go"}</button>
              </div>
            </div>

            {/* Hero image */}
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontWeight:600,color:C.dark,fontSize:"0.82em",marginBottom:7,textTransform:"uppercase",letterSpacing:0.5}}>Recipe Photo</label>
              <input ref={heroImgRef} type="file" accept="image/*,image/heic,image/heif" onChange={handleHeroImage} style={{display:"none"}} />
              {draft.heroImage ? (
                <div style={{position:"relative",borderRadius:10,overflow:"hidden",height:140}}>
                  <img src={draft.heroImage} alt="hero" style={{width:"100%",height:"100%",objectFit:"cover"}} />
                  <button onClick={()=>set("heroImage","")} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:6,color:C.white,cursor:"pointer",padding:"4px 10px",fontSize:"0.78em"}}>Remove</button>
                  <button onClick={()=>heroImgRef.current.click()} style={{position:"absolute",top:8,left:8,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:6,color:C.white,cursor:"pointer",padding:"4px 10px",fontSize:"0.78em"}}>Change</button>
                </div>
              ) : (
                <div onClick={()=>heroImgRef.current.click()} style={{border:"2px dashed "+C.border,borderRadius:10,padding:24,textAlign:"center",cursor:"pointer",color:C.light,background:C.cream2}}>
                  <div style={{fontSize:"1.8em",marginBottom:4}}>📷</div>
                  <div style={{fontSize:"0.85em",fontWeight:600}}>Add a photo from camera roll</div>
                  <div style={{fontSize:"0.75em",marginTop:2,color:C.light}}>HEIC, JPG, PNG supported</div>
                </div>
              )}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}>
              <input value={draft.title} onChange={(e)=>set("title",e.target.value)} placeholder="Title" style={{...iStyle,gridColumn:"1/-1"}} />
              <input value={draft.cookTime||""} onChange={(e)=>set("cookTime",e.target.value)} placeholder="Cook time" style={iStyle} />
              <input value={String(draft.servings||"")} onChange={(e)=>set("servings",e.target.value)} placeholder="Servings" style={iStyle} />
              <select value={draft.category||""} onChange={(e)=>set("category",e.target.value)} style={{...iStyle,background:C.white}}>
                <option value="">-- Category --</option>
                {CATEGORIES.map((c)=><option key={c} value={c}>{c}</option>)}
              </select>
              <input value={(draft.tags||[]).join(", ")} onChange={(e)=>set("tags",e.target.value.split(",").map((t)=>t.trim()).filter(Boolean))} placeholder="Tags: quick, vegetarian..." style={iStyle} />
            </div>
            <textarea value={draft.description||""} onChange={(e)=>set("description",e.target.value)} placeholder="Description" rows={2} style={{width:"100%",padding:"8px 11px",border:"1px solid "+C.border,borderRadius:8,fontSize:"0.86em",resize:"vertical",outline:"none",marginBottom:10,boxSizing:"border-box",fontFamily:SANS}} />

            {/* Macros */}
            <div style={{background:C.goldPale,border:"1px solid "+C.goldLight,borderRadius:8,padding:13,marginBottom:12}}>
              <div style={{fontWeight:600,fontSize:"0.78em",color:C.brown,letterSpacing:1,textTransform:"uppercase",marginBottom:9}}>Nutrition (per serving)</div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {["calories","protein","carbs","fat","fiber"].map((k)=>(
                  <div key={k} style={{display:"flex",flexDirection:"column",gap:3,alignItems:"center"}}>
                    <label style={{fontSize:"0.65em",color:C.brownLight,textTransform:"uppercase",letterSpacing:1}}>{k}</label>
                    <input type="number" value={(draft.macros||{})[k]||""} onChange={(e)=>setMacro(k,e.target.value)} style={{width:65,padding:"5px 7px",border:"1px solid "+C.border,borderRadius:8,fontSize:"0.86em",outline:"none",textAlign:"center"}} />
                  </div>
                ))}
              </div>
            </div>

            {/* Sections */}
            {draft.sections.map((sec,si)=>(
              <div key={si} style={{background:C.white,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:14}}>
                <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:12}}>
                  <strong style={{color:C.brown,fontSize:"0.82em"}}>Section:</strong>
                  <input value={sec.name} onChange={(e)=>{ const s=JSON.parse(JSON.stringify(draft.sections)); s[si].name=e.target.value; setDraft((p)=>({...p,sections:s})); }} style={{padding:"5px 9px",border:"1px solid "+C.border,borderRadius:6,fontSize:"0.86em",outline:"none",fontFamily:SANS}} />
                </div>
                <div style={{fontSize:"0.68em",letterSpacing:2,textTransform:"uppercase",color:C.brownLight,marginBottom:7}}>Ingredients</div>
                {sec.ingredients.map((ing,ii)=>(
                  <div key={ii} style={{display:"flex",gap:4,marginBottom:4,alignItems:"center"}}>
                    <input value={ing.amount} onChange={(e)=>updIng(si,ii,"amount",e.target.value)} placeholder="Amt" style={{width:50,padding:"5px 6px",border:"1px solid "+C.border,borderRadius:5,fontSize:"0.8em",outline:"none",fontFamily:SANS}} />
                    <input value={ing.unit||""} onChange={(e)=>updIng(si,ii,"unit",e.target.value)} placeholder="Unit" style={{width:58,padding:"5px 6px",border:"1px solid "+C.border,borderRadius:5,fontSize:"0.8em",outline:"none",fontFamily:SANS}} />
                    <input value={ing.name} onChange={(e)=>updIng(si,ii,"name",e.target.value)} placeholder="Ingredient" style={{flex:1,padding:"5px 6px",border:"1px solid "+C.border,borderRadius:5,fontSize:"0.8em",outline:"none",fontFamily:SANS}} />
                    <span style={{fontSize:"0.6em",color:C.cream3}}>id:{ing.id}</span>
                    <button onClick={()=>remIng(si,ii)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:"1em"}}>×</button>
                  </div>
                ))}
                <button onClick={()=>addIng(si)} style={{background:"none",border:"1px dashed "+C.goldLight,color:C.gold,borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:"0.78em",marginTop:3,fontFamily:SANS}}>+ ingredient</button>
                <div style={{fontSize:"0.68em",letterSpacing:2,textTransform:"uppercase",color:C.brownLight,margin:"12px 0 7px"}}>Steps <span style={{textTransform:"none",letterSpacing:0,color:C.cream3,fontWeight:400}}>- use {"{i1}"} to embed amounts</span></div>
                {sec.steps.map((step,sti)=>(
                  <div key={sti} style={{display:"flex",gap:5,marginBottom:6,alignItems:"flex-start"}}>
                    <div style={{minWidth:20,height:20,borderRadius:"50%",background:C.dark,color:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.68em",fontWeight:700,marginTop:4}}>{sti+1}</div>
                    <textarea value={step.text} onChange={(e)=>updStep(si,sti,e.target.value)} rows={2} style={{flex:1,padding:"5px 8px",border:"1px solid "+C.border,borderRadius:5,fontSize:"0.83em",resize:"vertical",outline:"none",fontFamily:SANS}} />
                    <button onClick={()=>remStep(si,sti)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",marginTop:4}}>×</button>
                  </div>
                ))}
                <button onClick={()=>addStep(si)} style={{background:"none",border:"1px dashed "+C.goldLight,color:C.gold,borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:"0.78em",marginTop:3,fontFamily:SANS}}>+ step</button>
              </div>
            ))}
            <button onClick={()=>setDraft((p)=>{ const s=JSON.parse(JSON.stringify(p.sections)); s.push({name:"New Section",ingredients:[],steps:[]}); return {...p,sections:s}; })} style={{background:"none",border:"1px dashed "+C.border,color:C.light,borderRadius:8,padding:"7px 18px",cursor:"pointer",fontSize:"0.86em",fontFamily:SANS}}>+ Add section</button>
          </div>
        </div>
      );
    }

    // Root App
    function App() {
      const [tab, setTab] = useState("library");
      const [screen, setScreen] = useState("library");
      const [recipes, setRecipes] = useState(() => loadRecipes());
      const [mealPlan, setMealPlanState] = useState(() => loadMealPlan());
      const [current, setCurrent] = useState(null);

      useEffect(() => { saveRecipes(recipes); }, [recipes]);

      function updateMealPlan(plan) { setMealPlanState(plan); saveMealPlan(plan); }
      function addRecipe(r) { setRecipes((p) => [r, ...p]); setCurrent(r); setScreen("view"); }
      function updateRecipe(r) { setRecipes((p) => p.map((x) => x.id===r.id?r:x)); setCurrent(r); }
      function deleteRecipe(id) { if (!window.confirm("Delete this recipe?")) return; setRecipes((p) => p.filter((r) => r.id!==id)); setScreen("library"); }
      function toggleFavorite(id) { setRecipes((p) => p.map((r) => r.id===id?{...r,favorite:!r.favorite}:r)); }

      if (screen==="import") return <ImportScreen onDone={(r)=>{addRecipe(r);setScreen("library");}} onCancel={()=>setScreen("library")} />;
      if (screen==="edit"&&current) return <EditRecipe recipe={current} onSave={(r)=>{ if(recipes.find((x)=>x.id===r.id)) updateRecipe(r); else addRecipe(r); setScreen("view"); }} onCancel={()=>setScreen("view")} />;
      if (screen==="view"&&current) return (
        <>
          <RecipeView recipe={current} onBack={()=>setScreen("library")} onEdit={()=>setScreen("edit")} onDelete={()=>deleteRecipe(current.id)} onUpdate={(r)=>{updateRecipe(r);setCurrent(r);}} onImport={(r)=>{addRecipe(r);setCurrent(r);}} />
          <BottomNav tab={tab} setTab={(t)=>{setTab(t);setScreen("library");}} />
        </>
      );

      return (
        <>
          {tab==="library" && <Library recipes={recipes} mealPlan={mealPlan} onOpen={(r)=>{setCurrent(r);setScreen("view");}} onAdd={()=>setScreen("import")} onFavorite={toggleFavorite} setTab={setTab} />}
          {tab==="plan" && <MealPlanner recipes={recipes} mealPlan={mealPlan} setMealPlan={updateMealPlan} />}
          {tab==="pantry" && <PantryChef onImport={(r)=>{addRecipe(r);setTab("library");}} />}
          <BottomNav tab={tab} setTab={setTab} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
